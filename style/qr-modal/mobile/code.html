<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kingdom Place - Book Your Appointment</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,700;6..72,800&amp;family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "secondary-container": "#544519",
                        "outline-variant": "#4d4635",
                        "surface-container-low": "#1b1b1b",
                        "on-tertiary-fixed-variant": "#27438a",
                        "on-secondary-container": "#c8b37d",
                        "inverse-primary": "#735c00",
                        "on-surface-variant": "#d0c5af",
                        "tertiary-container": "#97b0ff",
                        "surface-container-lowest": "#0e0e0e",
                        "on-secondary": "#3c2f05",
                        "primary-fixed": "#ffe088",
                        "on-background": "#e2e2e2",
                        "primary-container": "#d4af37",
                        "on-primary-fixed-variant": "#574500",
                        "inverse-on-surface": "#303030",
                        "on-tertiary-container": "#254188",
                        "inverse-surface": "#e2e2e2",
                        "on-error-container": "#ffdad6",
                        "on-error": "#690005",
                        "surface-container-high": "#2a2a2a",
                        "surface-container": "#1f1f1f",
                        "surface-bright": "#393939",
                        "tertiary": "#bfcdff",
                        "on-tertiary": "#082b72",
                        "error-container": "#93000a",
                        "secondary-fixed-dim": "#dac58d",
                        "surface-container-highest": "#353535",
                        "secondary-fixed": "#f7e1a6",
                        "outline": "#99907c",
                        "surface-dim": "#131313",
                        "on-primary-container": "#554300",
                        "tertiary-fixed-dim": "#b4c5ff",
                        "surface-tint": "#e9c349",
                        "on-tertiary-fixed": "#00174b",
                        "background": "#131313",
                        "on-primary-fixed": "#241a00",
                        "on-surface": "#e2e2e2",
                        "tertiary-fixed": "#dbe1ff",
                        "secondary": "#dac58d",
                        "primary": "#f2ca50",
                        "on-secondary-fixed-variant": "#544519",
                        "surface-variant": "#353535",
                        "surface": "#131313",
                        "error": "#ffb4ab",
                        "primary-fixed-dim": "#e9c349",
                        "on-primary": "#3c2f00",
                        "on-secondary-fixed": "#241a00"
                    },
                    fontFamily: {
                        "headline": ["Newsreader", "serif"],
                        "body": ["Manrope", "sans-serif"],
                        "label": ["Manrope", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0rem", "lg": "0rem", "xl": "0rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .dotted-bg {
            background-image: radial-gradient(#4d4635 1px, transparent 1px);
            background-size: 24px 24px;
        }
        .gold-glow {
            box-shadow: 0 0 25px rgba(242, 202, 80, 0.15);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body antialiased min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#131313] shadow-[0_4px_20px_rgba(226,226,226,0.04)]">
<div class="flex items-center justify-between px-6 h-20 w-full">
<div class="flex items-center">
<span class="material-symbols-outlined text-[#F2CA50] active:scale-95 transition-transform cursor-pointer">close</span>
</div>
<h1 class="font-headline text-2xl uppercase tracking-tighter text-[#F2CA50]">BOOK YOUR APPOINTMENT</h1>
<div class="w-6"></div> <!-- Spacer for centering -->
</div>
</header>
<!-- Main Content / Modal Canvas -->
<main class="flex-grow flex items-center justify-center px-4 pt-24 pb-32 dotted-bg">
<div class="max-w-xl w-full bg-surface-container-low p-8 md:p-12 relative overflow-hidden ring-1 ring-outline-variant/20 shadow-2xl">
<!-- Sovereign Branding Element -->
<div class="absolute -top-12 -right-12 opacity-5 pointer-events-none">
<span class="material-symbols-outlined text-[12rem]" data-icon="shield">shield</span>
</div>
<div class="flex flex-col items-center text-center space-y-8 relative z-10">
<!-- Header & Subtext -->
<div class="space-y-4">
<h2 class="font-headline text-4xl md:text-5xl font-bold tracking-tight text-primary leading-none">
                        Kingdom Place
                    </h2>
<p class="font-body text-on-surface-variant max-w-sm mx-auto leading-relaxed">
                        Scan the QR code below or click the button to continue to our booking platform, Studio24.
                    </p>
</div>
<!-- Visual: QR Code Placeholder -->
<div class="relative p-6 bg-surface-container-high ring-1 ring-primary/30 gold-glow">
<div class="w-48 h-48 md:w-56 md:h-56 bg-surface flex items-center justify-center relative">
<!-- Simulated QR Structure -->
<div class="absolute inset-4 border border-primary/20"></div>
<div class="grid grid-cols-4 grid-rows-4 gap-2 opacity-80">
<div class="w-8 h-8 bg-primary"></div>
<div class="w-8 h-8 border border-primary"></div>
<div class="w-8 h-8 bg-primary/40"></div>
<div class="w-8 h-8 bg-primary"></div>
<div class="w-8 h-8 border border-primary"></div>
<div class="w-8 h-8 bg-primary/20"></div>
<div class="w-8 h-8 bg-primary"></div>
<div class="w-8 h-8 border border-primary"></div>
<div class="w-8 h-8 bg-primary"></div>
<div class="w-8 h-8 bg-primary/40"></div>
<div class="w-8 h-8 border border-primary"></div>
<div class="w-8 h-8 bg-primary"></div>
<div class="w-8 h-8 bg-primary"></div>
<div class="w-8 h-8 border border-primary"></div>
<div class="w-8 h-8 bg-primary"></div>
<div class="w-8 h-8 bg-primary/60"></div>
</div>
<div class="absolute inset-0 flex items-center justify-center bg-surface/10 backdrop-blur-[1px]">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="qr_code_2">qr_code_2</span>
</div>
</div>
<!-- Corner Accents -->
<div class="absolute -top-1 -left-1 w-4 h-4 border-t-2 border-l-2 border-primary"></div>
<div class="absolute -top-1 -right-1 w-4 h-4 border-t-2 border-r-2 border-primary"></div>
<div class="absolute -bottom-1 -left-1 w-4 h-4 border-b-2 border-l-2 border-primary"></div>
<div class="absolute -bottom-1 -right-1 w-4 h-4 border-b-2 border-r-2 border-primary"></div>
</div>
<!-- Secondary Visual Link -->
<div class="flex items-center space-x-2 text-primary-container">
<span class="h-[1px] w-8 bg-primary-container/30"></span>
<span class="font-label text-[10px] tracking-[0.3em] uppercase font-bold">The Royal Standard</span>
<span class="h-[1px] w-8 bg-primary-container/30"></span>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-stretch h-24 bg-[#131313]/70 backdrop-blur-xl border-t border-[#4D4635]/20 z-50">
<!-- Active Action: GO TO STUDIO24 -->
<a class="flex flex-col items-center justify-center bg-gradient-to-tr from-[#D4AF37] to-[#F2CA50] text-[#3C2F00] p-4 w-full h-full active:brightness-110 transition-all group" href="#">
<span class="material-symbols-outlined mb-1" data-icon="storefront">storefront</span>
<span class="font-label text-[10px] font-bold tracking-[0.2em] uppercase">GO TO STUDIO24</span>
</a>
<!-- Inactive/Dismiss Action: CLOSE -->
<button class="flex flex-col items-center justify-center text-[#E2E2E2] p-4 w-full h-full hover:bg-[#1B1B1B] transition-all active:brightness-110">
<span class="material-symbols-outlined mb-1" data-icon="close">close</span>
<span class="font-label text-[10px] font-bold tracking-[0.2em] uppercase">CLOSE</span>
</button>
</nav>
</body></html>
